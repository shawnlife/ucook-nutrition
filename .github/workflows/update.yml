name: Update weekly menu

on:
  schedule:
    # Every Wednesday at 10:00 UTC = 12:00 SAST (UTC+2)
    # UCook typically publishes new menus Wednesday morning
    - cron: '0 10 * * 3'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab anytime

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch UCook data and generate page
        run: python3 ucook_nutrition.py --no-open

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "Weekly update: $(date +'%-d %B %Y')" &&
            git push
          )
